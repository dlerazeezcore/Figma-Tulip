name: iOS App Store Connect

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: Upload exported IPA to TestFlight/App Store Connect
        required: true
        default: true
        type: boolean
      bundle_id:
        description: iOS bundle identifier
        required: true
        default: com.theesim.app
        type: string
      team_id:
        description: Apple Developer Team ID
        required: true
        default: LFF7L83D75
        type: string
      scheme:
        description: Xcode scheme to archive
        required: true
        default: App
        type: string

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Show Xcode and SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            pnpm install --frozen-lockfile && break
            if [ "$i" -eq 3 ]; then
              echo "pnpm install failed after 3 attempts"
              exit 1
            fi
            echo "pnpm install failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Sync Capacitor iOS project
        run: npm run ios:sync

      - name: Import signing certificates
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Download App Store provisioning profile
        id: profiles
        uses: apple-actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ inputs.bundle_id }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Write App Store Connect API key file
        id: asc_key
        run: |
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ vars.APPSTORE_API_KEY_ID }}.p8"
          cat > "$ASC_KEY_PATH" <<'KEY'
          ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          KEY
          echo "path=$ASC_KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${{ inputs.team_id }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Archive iOS app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme "${{ inputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.path }}" \
            -authenticationKeyID "${{ vars.APPSTORE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ vars.APPSTORE_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ inputs.team_id }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ inputs.bundle_id }}" \
            CODE_SIGN_STYLE=Automatic \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.path }}" \
            -authenticationKeyID "${{ vars.APPSTORE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ vars.APPSTORE_ISSUER_ID }}"

      - name: Resolve IPA path
        id: ipa
        run: |
          IPA_PATH="$(find "$RUNNER_TEMP/export" -maxdepth 1 -name "*.ipa" | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in $RUNNER_TEMP/export"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.path }}

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          app-type: ios
          wait-for-processing: true